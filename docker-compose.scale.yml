# docker-compose.scale.yml — 7-node AsteroidDB cluster for large-scale testing.
#
# Usage:
#   docker compose -f docker-compose.scale.yml up -d --build
#
# Each node uses a full-mesh peer config from configs/scale/.
# Authority nodes are the first 3 (majority quorum of 3 out of 7).
services:
  node-1:
    build: .
    container_name: asteroidb-node-1
    cap_add:
      - NET_ADMIN
    ports:
      - "3001:3000"
    environment:
      ASTEROIDB_BIND_ADDR: "0.0.0.0:3000"
      ASTEROIDB_NODE_ID: "node-1"
      ASTEROIDB_INTERNAL_TOKEN: "${ASTEROIDB_INTERNAL_TOKEN}"
      ASTEROIDB_CONFIG: "/etc/asteroidb/config.json"
      ASTEROIDB_AUTHORITY_NODES: "node-1,node-2,node-3"
    volumes:
      - ./configs/scale/node-1.json:/etc/asteroidb/config.json:ro
    networks:
      - asteroidb

  node-2:
    build: .
    container_name: asteroidb-node-2
